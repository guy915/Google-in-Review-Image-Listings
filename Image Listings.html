<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google in Review — Image Listings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #4285f4;
      --red: #ea4335;
      --yellow: #fbbc04;
      --green: #34a853;
      --ink: #202124;
      --line: #e8eaed;
      --surface: #f8fafd;
    }

    body {
      min-height: 100vh;
      background: var(--surface);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 250, 253, 0.92);
      backdrop-filter: blur(12px);
    }

    .header-inner {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 16px 0;
    }

    .eyebrow {
      margin-bottom: 4px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-family: "Google Sans", "Product Sans", "Roboto", Arial, sans-serif;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .preview {
      display: block;
    }

    .preview:hover img {
      transform: translateY(-4px);
      box-shadow: 0 24px 54px rgba(32, 33, 36, 0.2);
    }

    .preview img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 16px 38px rgba(32, 33, 36, 0.14);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    @media (max-width: 760px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <p class="eyebrow">Google in Review</p>
      <h1>Image Listings</h1>
    </div>
  </header>

  <main>
    <section class="gallery" aria-label="Mobile design image listings" id="gallery"></section>
  </main>

  <script>
    const imageNames = [
      "Surprise Gift",
      "Partner Party",
      "New Doors",
      "Learning Adventure",
      "Opportunities Sparked",
      "Impact Road",
      "Leveled Up",
      "Biggest Quarter",
      "Explorer At Heart",
      "Consistency Calendar",
      "Courses Completed",
      "Keep Growing",
      "Deal Closer",
      "Knowledge Collector",
      "Deals Closed",
      "Time Count",
      "Expertise Stats",
      "Expertise Growth",
      "Highlights Overview",
      "Milestones Timeline",
      "New Heights",
      "Top One Percent",
      "Orbiting Excellence",
      "Deals Orbit"
    ];

    const gallery = document.getElementById("gallery");

    gallery.innerHTML = imageNames.map((name) => {
      const path = `Images/${encodeURIComponent(name)}.png`;

      return `
        <a class="preview" href="${path}">
          <img src="${path}" alt="${name} design" loading="lazy" />
        </a>
      `;
    }).join("");
  </script>
</body>
</html>
